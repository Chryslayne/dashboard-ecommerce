<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dashboard E-commerce - Google Sheets</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0; padding: 20px; background: #f4f7fa; color: #333;
  }
  h1 {
    text-align: center;
    margin-bottom: 30px;
    color: #2c3e50;
  }
  .cards {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 30px;
  }
  .card {
    background: white;
    box-shadow: 0 0 15px #ddd;
    border-radius: 8px;
    flex: 1 1 200px;
    max-width: 240px;
    padding: 20px;
    text-align: center;
  }
  .card h2 {
    font-size: 2.5em;
    margin: 0 0 10px;
    color: #27ae60;
  }
  .card p {
    font-size: 1.1em;
    color: #555;
  }
  .charts {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 40px;
  }
  .chart-container {
    background: white;
    border-radius: 8px;
    box-shadow: 0 0 15px #ddd;
    padding: 20px;
    flex: 1 1 350px;
    max-width: 600px;
  }
  canvas {
    max-width: 100%;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    box-shadow: 0 0 15px #ddd;
    border-radius: 8px;
    overflow: hidden;
  }
  thead {
    background: #2980b9;
    color: white;
  }
  th, td {
    padding: 12px 15px;
    border: 1px solid #ddd;
    text-align: left;
    font-size: 0.9em;
  }
  tbody tr:nth-child(even) {
    background: #f9f9f9;
  }
  @media (max-width: 768px) {
    .charts, .cards {
      flex-direction: column;
      align-items: center;
    }
    .chart-container, .card {
      max-width: 100%;
    }
  }
</style>
</head>
<body>
<h1>Dashboard E-commerce - Google Sheets</h1>
<div class="cards">
  <div class="card">
    <h2 id="totalOrders">0</h2>
    <p>Total de Pedidos</p>
  </div>
  <div class="card">
    <h2 id="uniqueDrivers">0</h2>
    <p>Motoristas Ativos</p>
  </div>
  <div class="card">
    <h2 id="uniqueVehicles">0</h2>
    <p>Veículos Utilizados</p>
  </div>
  <div class="card">
    <h2 id="uniqueCreators">0</h2>
    <p>Auxiliares (Creators)</p>
  </div>
</div>

<div class="charts">
  <div class="chart-container">
    <h3>Pedidos por Motorista</h3>
    <canvas id="ordersByDriver"></canvas>
  </div>
  <div class="chart-container">
    <h3>Distribuição de Rotas (Cluster)</h3>
    <canvas id="clusterDistribution"></canvas>
  </div>
</div>

<h3>Detalhes dos Pedidos</h3>
<table>
  <thead>
    <tr>
      <th>Driver Name</th>
      <th>Driver</th>
      <th>Veículo</th>
      <th>Qtd. Pedidos</th>
      <th>Creator</th>
      <th>Hora Início</th>
      <th>Hora Fim</th>
      <th>Task ID</th>
      <th>Cluster</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const csvUrl = 'https://docs.google.com/spreadsheets/d/13ItptD7JUCh38h4TwWkdPTjX4Jr8x7mnp_deWXjk0Ys/export?format=csv&gid=0';

  function csvToArray(str, delimiter = ',') {
    const headers = str.slice(0, str.indexOf('\n')).split(delimiter).map(h => h.trim());
    const rows = str.slice(str.indexOf('\n') + 1).split('\n').filter(r => r.trim().length > 0);
    return rows.map(row => {
      const values = row.split(delimiter);
      return headers.reduce((obj, header, index) => {
        obj[header] = values[index] ? values[index].trim() : '';
        return obj;
      }, {});
    });
  }

  fetch(csvUrl)
    .then(response => {
      if (!response.ok) throw new Error('Erro ao buscar dados: ' + response.status);
      return response.text();
    })
    .then(data => {
      const raw = csvToArray(data);

      // Mapeando para as chaves que o dashboard usa
      const dataset = raw.map(r => ({
        driverName: r['Driver name'] || '',
        driver: r['Driver'] || '',
        veiculo: r['Veiculo'] || '',
        numberOfOrders: parseInt(r['Number of order/TO'] || '0', 10) || 0,
        creator: r['Creator'] || '',
        createTime: r['Create Time'] || '',
        driverAssignedTime: r['Driver Assigned Time'] || '',
        taskId: r['Task ID'] || '',
        cluster: r['Cluster'] || ''
      }));

      document.getElementById('totalOrders').textContent = dataset.reduce((acc, d) => acc + d.numberOfOrders, 0);
      document.getElementById('uniqueDrivers').textContent = new Set(dataset.map(d => d.driverName)).size;
      document.getElementById('uniqueVehicles').textContent = new Set(dataset.map(d => d.veiculo)).size;
      document.getElementById('uniqueCreators').textContent = new Set(dataset.map(d => d.creator)).size;

      // Pedidos por motorista
      const ordersByDriver = {};
      dataset.forEach(d => {
        if (!ordersByDriver[d.driverName]) ordersByDriver[d.driverName] = 0;
        ordersByDriver[d.driverName] += d.numberOfOrders;
      });
      const drivers = Object.keys(ordersByDriver);
      const ordersCount = drivers.map(d => ordersByDriver[d]);

      // Distribuição de Clusters
      const clustersCount = {};
      dataset.forEach(d => {
        if (!clustersCount[d.cluster]) clustersCount[d.cluster] = 0;
        clustersCount[d.cluster]++;
      });
      const clusters = Object.keys(clustersCount);
      const clustersValues = clusters.map(c => clustersCount[c]);

      // Gráficos
      const ctxDriver = document.getElementById('ordersByDriver').getContext('2d');
      new Chart(ctxDriver, {
        type: 'bar',
        data: {
          labels: drivers,
          datasets: [{
            label: 'Quantidade de Pedidos',
            data: ordersCount,
            backgroundColor: '#2980b9',
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: { beginAtZero: true },
            x: { ticks: { maxRotation: 45, minRotation: 45 } }
          }
        }
      });

      const ctxCluster = document.getElementById('clusterDistribution').getContext('2d');
      new Chart(ctxCluster, {
        type: 'pie',
        data: {
          labels: clusters,
          datasets: [{
            data: clustersValues,
            backgroundColor: [
              '#27ae60', '#2980b9', '#8e44ad',
              '#c0392b', '#f39c12', '#d35400',
              '#2c3e50', '#7f8c8d'
            ],
          }]
        },
        options: { responsive: true }
      });

      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      dataset.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${row.driverName}</td>
          <td>${row.driver}</td>
          <td>${row.veiculo}</td>
          <td>${row.numberOfOrders}</td>
          <td>${row.creator}</td>
          <td>${row.createTime}</td>
          <td>${row.driverAssignedTime}</td>
          <td>${row.taskId}</td>
          <td>${row.cluster}</td>`;
        tbody.appendChild(tr);
      });
    })
    .catch(err => {
      document.body.innerHTML = `<h2 style="color:red; text-align:center; margin-top:50px;">${err.message}</h2>`;
    });
</script>
</body>
</html>
